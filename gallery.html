<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Or | Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="preloader" id="preloader"><h1 class="preloader-logo">Gallery</h1><div class="preloader-line"></div></div>

    <nav class="navbar">
        <a href="index.html" class="logo">L'Or</a>
        <div class="nav-links">
            <a href="menu.html" class="nav-link">Menu</a>
            <a href="order.html" class="nav-link">Order</a> <a href="private-dining.html" class="nav-link">Private Dining</a>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <a href="events.html" class="nav-link">Events</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </div>
        <div class="nav-actions">
            <a href="reservation.html" class="nav-reserve-btn">Reserve</a> 
            <button class="cart-toggle" id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><h2>Your Order</h2><button class="close-cart" id="closeCart">&times;</button></div><div class="cart-items" id="cartItems"></div><div class="cart-footer"><div class="total">Total: $<span id="cartTotal">0.00</span></div><a href="checkout.html" class="checkout-btn">Checkout</a></div></div>
    <div class="cart-overlay" id="cartOverlay"></div>

    <main id="smooth-wrapper">
        <div id="smooth-content">
            <section class="section-pad container" style="padding-top: 15rem;">
                <div class="page-header gsap-fade"><span class="subtitle">Aesthetic</span><h2>A Feast for the Eyes</h2></div>
                <div class="grid-3">
                    <div class="img-block gsap-fade" style="height: 400px;"><img src="https://images.unsplash.com/photo-1550966871-3ed3cdb5ed0c?q=80&w=800"></div>
                    <div class="img-block gsap-fade" style="height: 400px;"><img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=800"></div>
                    <div class="img-block gsap-fade" style="height: 400px;"><img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=800"></div>
                    <div class="img-block gsap-fade" style="height: 400px;"><img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=800"></div>
                    <div class="img-block gsap-fade" style="height: 400px;"><img src="https://images.unsplash.com/photo-1652195960911-c9f55224bd89?q=80&w=987&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"></div>
                    <div class="img-block gsap-fade" style="height: 400px;"><img src="https://images.unsplash.com/photo-1544148103-0773bf10d330?q=80&w=800"></div>
                </div>
            </section>
            <footer><p>&copy; 2026 L'Or Restaurant.</p></footer>
        </div>
    </main>

    <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
