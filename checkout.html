<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>L'Or | Secure Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">L'Or</a>
        <div class="nav-links">
            <a href="menu.html" class="nav-link">Menu</a>
            <a href="order.html" class="nav-link">Back to Order</a>
        </div>
    </nav>

    <main id="smooth-wrapper">
        <div id="smooth-content">
            <section class="section-pad container" style="padding-top: 10rem;">
                <div class="page-header gsap-fade" style="margin-bottom: 4rem; text-align: left;">
                    <span class="subtitle">Final Step</span>
                    <h2>Secure Checkout</h2>
                </div>

                <div class="checkout-grid">
                    <div class="checkout-form gsap-fade">
                        <form id="placeOrderForm">
                            <h3 class="form-section-title">Contact Information</h3>
                            <div class="input-group">
                                <input type="email" placeholder="Email Address" required>
                                <input type="tel" placeholder="Phone Number" required>
                            </div>

                            <h3 class="form-section-title">Delivery Details</h3>
                            <div class="input-group">
                                <input type="text" placeholder="First Name" required>
                                <input type="text" placeholder="Last Name" required>
                            </div>
                            <input type="text" placeholder="Street Address" style="margin-bottom: 1.5rem;" required>
                            <div class="input-group">
                                <input type="text" placeholder="City" required>
                                <input type="text" placeholder="ZIP / Postal Code" required>
                            </div>

                            <h3 class="form-section-title">Payment Method</h3>
                            <div class="payment-box">
                                <input type="text" placeholder="Card Number (xxxx xxxx xxxx xxxx)" required style="margin-bottom: 1rem;">
                                <div class="input-group">
                                    <input type="text" placeholder="MM/YY" required>
                                    <input type="text" placeholder="CVC" required>
                                </div>
                            </div>

                            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 2rem;">Place Order</button>
                        </form>
                    </div>

                    <div class="checkout-summary gsap-fade">
                        <h3 style="margin-bottom: 2rem; font-size: 1.8rem;">Order Summary</h3>
                        <div id="checkoutItemsList" class="checkout-items-list">
                            </div>
                        
                        <div class="summary-totals">
                            <div class="summary-row">
                                <span>Subtotal</span>
                                <span>$<span id="checkoutSubtotal">0.00</span></span>
                            </div>
                            <div class="summary-row">
                                <span>Delivery Fee</span>
                                <span>$15.00</span>
                            </div>
                            <div class="summary-row">
                                <span>Taxes (8%)</span>
                                <span>$<span id="checkoutTaxes">0.00</span></span>
                            </div>
                            <div class="summary-row total-row">
                                <span>Total</span>
                                <span>$<span id="checkoutFinalTotal">0.00</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <footer><p>&copy; 2026 L'Or Restaurant.</p></footer>
        </div>
    </main>

    <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
